version: '3.8'

services:
  backend:
    build: .
    container_name: media-tracker-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/media_tracker.db
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
    volumes:
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: .
    container_name: media-tracker-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped

volumes:
  data:

